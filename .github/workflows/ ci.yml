name: CI - SaaS DevOps Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend - Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: abonnement_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Run backend tests
        run: mvn test

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: abonnement-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: abonnement-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --configuration production

  docker:
    name: Docker - Build Images
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t abonnement-backend:ci ./abonnement_backend

      - name: Build frontend Docker image
        run: docker build -t abonnement-frontend:ci ./abonnement-frontend