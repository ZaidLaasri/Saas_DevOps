name: CI/CD - SaaS DevOps Platform

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}/saas_devops

jobs:
  backend:
    name: Backend - Build and Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: abonnement_backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build backend
        run: mvn clean package -DskipTests

      - name: Run backend tests
        run: mvn test

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: abonnement-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: abonnement-frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build -- --configuration production

  docker:
    name: Docker - Build and Push Images
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    if: github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert image namespace to lowercase
        run: echo "IMAGE_NAMESPACE_LC=$(echo '${{ env.IMAGE_NAMESPACE }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-backend:latest \
            -t $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-backend:${{ github.sha }} \
            ./abonnement_backend

      - name: Build frontend Docker image
        run: |
          docker build \
            -t $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-frontend:latest \
            -t $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-frontend:${{ github.sha }} \
            ./abonnement-frontend

      - name: Push backend Docker image
        run: |
          docker push $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-backend:latest
          docker push $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-backend:${{ github.sha }}

      - name: Push frontend Docker image
        run: |
          docker push $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-frontend:latest
          docker push $REGISTRY/$IMAGE_NAMESPACE_LC/abonnement-frontend:${{ github.sha }}